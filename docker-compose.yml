services:
  mariadb_gp:
    image: mariadb:lts
    container_name: mariadb_gp
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root_gp_123
      MARIADB_DATABASE: gestion_projets
      MARIADB_USER: gp_user
      MARIADB_PASSWORD: gp_password_123
    volumes:
      - mariadb_gp_data:/var/lib/mysql
    networks:
      - gp_net

  phpmyadmin_gp:
    image: phpmyadmin:latest
    container_name: phpmyadmin_gp
    restart: unless-stopped
    environment:
      PMA_HOST: mariadb_gp
      PMA_PORT: 3306
      PMA_ARBITRARY: 0
    depends_on:
      - mariadb_gp
    networks:
      - gp_net
    ports:
      - "8082:80"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app_gp
    restart: unless-stopped
    working_dir: /var/www/src
    volumes:
      - ./:/var/www
    networks:
      - gp_net
    depends_on:
      - mariadb_gp

  nginx:
    image: nginx:alpine
    container_name: nginx_gp
    restart: unless-stopped
    ports:
      - "8083:80"
    volumes:
      - ./:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - gp_net
    depends_on:
      - app

volumes:
  mariadb_gp_data:

networks:
  gp_net: